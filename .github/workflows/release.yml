name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build kernel tarball
        id: tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          ARCHIVE="cbim-kernel-${VER}.tar.gz"
          STAGE="$(mktemp -d)/cbim-kernel-${TAG}"
          mkdir -p "$STAGE"
          # Copy kernel package contents (cbim_kernel/, requirements.txt, tests/, VERSION)
          cp -R v1/src/kernel/. "$STAGE/"
          # Copy updater/ from sibling directory
          cp -R v1/src/updater "$STAGE/updater"
          # Strip caches
          find "$STAGE" -type d -name '__pycache__' -prune -exec rm -rf {} +
          find "$STAGE" -type d -name '.pytest_cache' -prune -exec rm -rf {} +
          tar -czf "$ARCHIVE" -C "$STAGE" .
          echo "archive=$ARCHIVE" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Extract block between ## [TAG] and the next ## [
          NOTES=$(awk "/^## \[$TAG\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          ZH_NOTES=$(awk "/^## \[$TAG\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.zh-CN.md)

          # Combine bilingual notes
          COMBINED="## English

          $NOTES

          ---

          ## 中文

          $ZH_NOTES"

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$COMBINED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE=$(git log -1 --pretty=%s "$TAG" | sed 's/^release: //')
          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "${{ steps.notes.outputs.notes }}"

      - name: Upload kernel tarball to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" "${{ steps.tarball.outputs.archive }}" --clobber
